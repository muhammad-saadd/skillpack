name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell scripts with bash -n
        run: for f in bin/skillpack install.sh skills/*/index.sh; do bash -n "$f"; done

      - name: Check shell scripts with shellcheck
        run: for f in bin/skillpack install.sh skills/*/index.sh; do shellcheck "$f"; done
